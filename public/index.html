<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shyam POS - Retail Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom scrollbar for a cleaner look */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-100 font-sans text-slate-900 flex h-screen overflow-hidden">

    <div class="w-2/3 flex flex-col h-full border-r border-slate-200">
        <header class="p-6 bg-white border-b border-slate-200">
            <h1 class="text-3xl font-black text-indigo-600 tracking-tight">SHREE SHYAM STUDENTS EMPORIUM</h1>
            <p class="text-slate-500 text-sm mt-1">Multi-Store Inventory & Billing System v1.0</p>
        </header>

        <div class="flex-grow p-6 overflow-y-auto">
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4" id="products-grid">
                </div>
        </div>
    </div>

    <div class="w-1/3 flex flex-col bg-white shadow-2xl h-full">
        <div class="p-6 border-b border-slate-100 bg-slate-50/50">
            <h2 class="text-xl font-bold flex items-center gap-2">
                <span class="bg-indigo-600 w-2 h-6 rounded-full"></span>
                Current Invoice
            </h2>
        </div>

        <div id="cart-container" class="flex-grow overflow-y-auto p-6 space-y-3">
            <div class="text-center py-20 text-slate-400" id="empty-msg">
                <p class="text-5xl mb-4">🛒</p>
                <p>Your cart is empty.<br>Select items to start billing.</p>
            </div>
        </div>

        <div class="p-6 border-t border-slate-200 bg-slate-50">
            <div class="flex justify-between items-end mb-6">
                <span class="text-slate-500 font-medium">Grand Total</span>
                <span class="text-4xl font-black text-indigo-700" id="total-display">₹0</span>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <button onclick="processPayment('CASH')" 
                    class="bg-emerald-600 hover:bg-emerald-700 text-white py-4 rounded-2xl font-bold text-lg shadow-lg shadow-emerald-200 transition-all active:scale-95">
                    CASH (F2)
                </button>
                <button onclick="processPayment('UPI')" 
                    class="bg-sky-600 hover:bg-sky-700 text-white py-4 rounded-2xl font-bold text-lg shadow-lg shadow-sky-200 transition-all active:scale-95">
                    UPI (F3)
                </button>
            </div>
            
            <button onclick="resetCart()" class="w-full mt-4 text-slate-400 text-sm font-medium hover:text-rose-500 transition-colors">
                Discard Current Bill
            </button>
        </div>
    </div>

    <script>
        // Initial Product Data
        const products = [
            { id: 1, name: "Classmate Notebook", price: 60, icon: "📚" },
            { id: 2, name: "Parker Vector Pen", price: 250, icon: "🖋️" },
            { id: 3, name: "Lakme Lipstick", price: 450, icon: "💄" },
            { id: 4, name: "Apsara Pencil Box", price: 100, icon: "✏️" },
            { id: 5, name: "Geometry Box", price: 180, icon: "📐" }
        ];

        let cart = [];

        // 1. Draw Products on Screen
        function initProducts() {
            const grid = document.getElementById('products-grid');
            grid.innerHTML = products.map(p => `
                <div onclick="addToCart(${p.id})" class="bg-white p-5 rounded-3xl border-2 border-transparent hover:border-indigo-500 shadow-sm hover:shadow-xl cursor-pointer transition-all transform hover:-translate-y-1 group">
                    <div class="text-3xl mb-3 group-hover:scale-110 transition-transform">${p.icon}</div>
                    <h3 class="font-bold text-slate-800">${p.name}</h3>
                    <p class="text-indigo-600 font-black text-xl mt-1">₹${p.price}</p>
                </div>
            `).join('');
        }

        // 2. Add Item to Cart
        function addToCart(id) {
            const product = products.find(p => p.id === id);
            const existing = cart.find(item => item.id === id);

            if (existing) {
                existing.qty++;
            } else {
                cart.push({ ...product, qty: 1 });
            }
            updateUI();
        }

        // 3. Update the UI (Totals & Cart List)
        function updateUI() {
            const container = document.getElementById('cart-container');
            const totalDisplay = document.getElementById('total-display');
            const emptyMsg = document.getElementById('empty-msg');

            if (cart.length === 0) {
                emptyMsg.style.display = 'block';
                container.querySelectorAll('.cart-item').forEach(el => el.remove());
                totalDisplay.innerText = "₹0";
                return;
            }

            emptyMsg.style.display = 'none';
            
            // Render cart items
            const itemsHTML = cart.map(item => `
                <div class="cart-item flex justify-between items-center bg-indigo-50/50 p-4 rounded-2xl border border-indigo-100">
                    <div>
                        <p class="font-bold text-slate-800">${item.name}</p>
                        <p class="text-sm text-slate-500">₹${item.price} x ${item.qty}</p>
                    </div>
                    <p class="font-black text-indigo-700">₹${item.price * item.qty}</p>
                </div>
            `).join('');

            // Keep the empty message hidden and update items
            const currentItems = container.querySelectorAll('.cart-item');
            currentItems.forEach(el => el.remove());
            container.insertAdjacentHTML('beforeend', itemsHTML);

            const total = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
            totalDisplay.innerText = "₹" + total;
        }

        // 4. SAVE TO DATABASE (The "Real" Logic)
        async function processPayment(method) {
            if (cart.length === 0) return alert("Add items first!");

            const total = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
            
            // Show loading state on buttons
            console.log(`Processing ${method} payment...`);

            try {
                // Using a relative path '/api/checkout' works best for Render
                const response = await fetch('/api/checkout', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        items: cart,
                        total: total,
                        payment_method: method,
                        customer_phone: "Guest" 
                    })
                });

                if (!response.ok) throw new Error('Server connection failed');

                const result = await response.json();

                if (result.success) {
                    alert(`✅ BILL SAVED!\nMethod: ${method}\nAmount: ₹${total}`);
                    resetCart();
                } else {
                    alert("❌ Database Error: " + result.error);
                }
            } catch (err) {
                console.error(err);
                alert("❌ Connection Failed!\nCheck your Render logs to see if the database is connected.");
            }
        }

        function resetCart() {
            cart = [];
            updateUI();
        }

        // Initialize on load
        window.onload = () => {
            initProducts();
            updateUI();
        };
    </script>
</body>
</html>
