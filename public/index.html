<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Shyam POS - Checkout</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex h-screen">
    <div class="w-2/3 p-6 overflow-y-auto">
        <h1 class="text-3xl font-black text-indigo-700 mb-6">Shree Shyam Students Emporium</h1>
        <div id="products" class="grid grid-cols-3 gap-6">
            </div>
    </div>

    <div class="w-1/3 bg-white shadow-2xl p-6 flex flex-col border-l-4 border-indigo-500">
        <h2 class="text-xl font-bold border-b pb-4 text-gray-700">Current Bill</h2>
        <div id="cart" class="flex-grow py-4 overflow-y-auto space-y-2">
            </div>
        
        <div class="border-t-2 pt-4 bg-gray-50 -mx-6 px-6 pb-6">
            <div class="flex justify-between text-3xl font-black mb-6 text-indigo-900">
                <span>Total:</span><span id="total-price">₹0</span>
            </div>
            <div class="grid grid-cols-1 gap-3">
                <button onclick="pay('CASH')" class="w-full bg-green-600 hover:bg-green-700 text-white py-5 rounded-2xl font-black text-xl shadow-lg transition-transform active:scale-95">
                    PAY CASH (F2)
                </button>
                <button onclick="pay('UPI')" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-5 rounded-2xl font-black text-xl shadow-lg transition-transform active:scale-95">
                    PAY UPI (F3)
                </button>
            </div>
        </div>
    </div>

    <script>
        // 1. Your Initial Items
        let products = [
            { id: 1, name: "Classmate Notebook", price: 60 },
            { id: 2, name: "Parker Vector Pen", price: 250 },
            { id: 3, name: "Lakme Lipstick", price: 450 }
        ];

        let cart = [];

        // 2. Display the products on screen
        function render() {
            const productDiv = document.getElementById('products');
            productDiv.innerHTML = products.map(p => `
                <div onclick="add(${p.id})" class="bg-white p-6 rounded-3xl shadow-md cursor-pointer hover:shadow-2xl hover:border-indigo-500 border-2 border-transparent transition-all transform hover:-translate-y-1">
                    <p class="font-black text-xl text-gray-800">${p.name}</p>
                    <p class="text-indigo-600 font-bold text-2xl mt-2">₹${p.price}</p>
                </div>
            `).join('');

            const cartDiv = document.getElementById('cart');
            if (cart.length === 0) {
                cartDiv.innerHTML = '<p class="text-center text-gray-400 mt-10">Cart is empty</p>';
            } else {
                cartDiv.innerHTML = cart.map(i => `
                    <div class="flex justify-between items-center bg-indigo-50 p-3 rounded-xl">
                        <span class="font-bold">${i.name} x ${i.qty}</span>
                        <span class="font-black text-indigo-700">₹${i.price * i.qty}</span>
                    </div>
                `).join('');
            }

            let total = cart.reduce((s, i) => s + (i.price * i.qty), 0);
            document.getElementById('total-price').innerText = "₹" + total;
        }

        // 3. Add item to cart
        function add(id) {
            let p = products.find(x => x.id === id);
            let inCart = cart.find(x => x.id === id);
            if (inCart) {
                inCart.qty++;
            } else {
                cart.push({ ...p, qty: 1 });
            }
            render();
        }

        // 4. THE IMPORTANT PART: The "Pay" function
        async function pay(method) {
            if (cart.length === 0) return alert("Please add items to the cart first!");

            const total = cart.reduce((s, i) => s + (i.price * i.qty), 0);
            
            try {
                // Change the URL below to your actual Render URL
                const response = await fetch('/api/checkout', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        items: cart,
                        total: total,
                        payment_method: method,
                        customer_phone: "9999999999"
                    })
                });

                const result = await response.json();

                if (result.success) {
                    alert("✅ SUCCESS!\nBill Saved to Supabase.\nTotal: ₹" + total);
                    cart = [];
                    render();
                } else {
                    alert("❌ Server Error: " + (result.error || "Unknown error"));
                }
            } catch (err) {
                console.error(err);
                alert("❌ Connection Failed. Check if Render is still 'Live'.");
            }
        }

        // Initialize the screen
        render();
    </script>
</body>
</html>
